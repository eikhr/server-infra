# server-infra on eik-desktop — revived 2026-07.
# Trimmed from the original: dropped vaultwarden, filebrowser, and the duckdns
# container (the FritzBox handles DuckDNS now). Public via FritzBox port-forward
# 80/443 -> 192.168.188.194. Home Assistant is a separate stack, not proxied.

services:

  traefik:
    image: traefik:v2.10
    command:
      - "--api"
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      #- "--certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.myresolver.acme.email=eik@eikhr.no"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # dashboard, bound to localhost only
      - "127.0.0.1:8080:8080"
    volumes:
      - "./data/letsencrypt:/letsencrypt"
      - "./data/traefik:/data"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.eikhr.no`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=myresolver"
      - "traefik.http.routers.traefik.middlewares=myauth"
      - "traefik.http.middlewares.myauth.basicauth.usersfile=/data/usersfile"

  www:
    build: https://github.com/eikhr/eikhr.github.io.git
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.www.rule=Host(`www.eikhr.no`)"
      - "traefik.http.routers.www.entrypoints=websecure"
      - "traefik.http.routers.www.tls.certresolver=myresolver"
      - "traefik.http.routers.www.priority=1"

  calendar-svg:
    build: https://github.com/eikhr/calendar-svg.git
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calendar-svg.rule=Host(`www.eikhr.no`) && Path(`/calendar.svg`)"
      - "traefik.http.routers.calendar-svg.entrypoints=websecure"
      - "traefik.http.routers.calendar-svg.tls.certresolver=myresolver"

  groupup-frontend:
    build:
      context: ./groupup
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      - groupup-backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.groupup-frontend.rule=Host(`groupup.eikhr.no`)"
      - "traefik.http.routers.groupup-frontend.entrypoints=websecure"
      - "traefik.http.routers.groupup-frontend.tls.certresolver=myresolver"

  groupup-backend:
    build:
      context: ./groupup
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    depends_on:
      - groupup-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.groupup-backend.rule=Host(`groupup.eikhr.no`) && PathPrefix(`/api`)"
      - "traefik.http.routers.groupup-backend.entrypoints=websecure"
      - "traefik.http.routers.groupup-backend.tls.certresolver=myresolver"

  groupup-db:
    # Pinned: bare `postgres` now resolves to 18+, which changed its data-dir
    # layout and won't start against the /var/lib/postgresql/data mount below.
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: groupup
      POSTGRES_DB: groupupdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/groupup/pgdata:/var/lib/postgresql/data

  warehouse-server:
    build:
      context: https://github.com/ollfkaih/warehouse.git#docker-server
      dockerfile: server.Dockerfile
    restart: unless-stopped
    volumes:
      - ./data/warehouse:/root/warehouse
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.warehouse-server.rule=Host(`warehouse.eikhr.no`)"
      - "traefik.http.routers.warehouse-server.entrypoints=websecure"
      - "traefik.http.routers.warehouse-server.tls.certresolver=myresolver"

  minecraft:
    image: itzg/minecraft-server
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - ./data/minecraft:/data
